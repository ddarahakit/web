spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 20MB      # 프로필/이미지 업로드 한도(기본 1MB → 초과 시 500). nginx client_max_body_size 100m와 정합
      max-request-size: 20MB
  jpa:
    # OSIV 비활성: 커넥션을 요청 끝까지 잡지 않고 서비스 트랜잭션 종료 시 반납 → 동시 처리량 향상.
    # (전 서비스가 클래스레벨 @Transactional 로 트랜잭션 경계를 가져 지연로딩이 트랜잭션 안에서 일어남)
    open-in-view: false
  datasource:
    hikari:
      # 기본 10 → 20 (6코어 머신 + MariaDB max_connections 151 여유 내). OSIV off 와 함께 동시성 개선.
      maximum-pool-size: 20