spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-id
            client-secret: test-google-secret
            redirect-uri: http://localhost/login/oauth2/code/google
          kakao:
            client-id: test-kakao-id
            client-secret: test-kakao-secret
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost/login/oauth2/code/kakao
            scope: profile_nickname
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: http://localhost/kakao/auth
            token-uri: http://localhost/kakao/token
            user-info-uri: http://localhost/kakao/userinfo
            user-name-attribute: id
  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          starttls:
            enable: false
          auth: false

jwt:
  secret:
    key: testSecretKeyForTestingPurposesOnly1234567890abcdef

portone:
  portone_secret: test-portone-secret

app:
  domain:
    server: "http://localhost"
    cookie: "localhost"
  aes:
    key: testAesSecretKey1234567890123456
  token:
    access-max-age: 1800000
    refresh-max-age: 604800000
    access-format: "ATOKEN=%s; HttpOnly; Path=/; Max-Age=%d"
    refresh-format: "RTOKEN=%s; HttpOnly; Path=/; Max-Age=%d"

project:
  upload:
    path: /tmp/test-uploads

logging:
  level:
    root: WARN
    com.ddarahakit: INFO
